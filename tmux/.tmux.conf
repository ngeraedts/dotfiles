################################################################################
#   Custom keybindings
################################################################################

# use ctrl- for the prefix; ctrl-b is a stretch
set-option -g prefix C-j
unbind-key C-b
bind-key j send-prefix

# ctrl-l ctrl-space for last active window
bind-key C-Space last-window

# vim-like bindings for swapping panes
set -g status-keys vi
setw -g mode-keys vi

# Vertical and horizontal splits to
bind -n C-'\' split-window -h

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind -n C-n new-window
unbind c

# quick config reload
bind r source-file ~/.tmux.conf


bind-key S \
    command-prompt -N -p "Split Size: " \
        "if-shell -F '%1' \
            'split-window -p %1' \
            'split-window' -h"

################################################################################
#   General
################################################################################

# start window numbering at 1, like the rest of the world
set -g base-index 1
set-window-option -g pane-base-index 1

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# 256 colour mode so that solarized colours work
set -g default-terminal "screen-256color"

# reduce repeat timeout (default 500)
set-option -g repeat-time 250

################################################################################
#   COLOUR (Solarized 256)
################################################################################

# default statusbar colors
set-option -g status-bg colour235
set-option -g status-fg colour28

# pane number display
set-option -g display-panes-active-colour colour33
set-option -g display-panes-colour colour166

# mouse functionality
set -g mouse on

# Small delay for escape key press. I want to practice being deliberate with my
# inputs.
set -sg escape-time 10
